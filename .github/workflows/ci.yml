name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi \
            "uvicorn[standard]" \
            "pydantic>=2.0" \
            opencv-python-headless \
            "Pillow>=10.0" \
            "pillow-heif>=0.16" \
            "numpy>=1.26" \
            "imagehash>=4.3" \
            "rawpy>=0.18" \
            mediapipe \
            pytest

      - name: Run tests
        run: PYTHONPATH=photopicker pytest -v
